  <!-- Graduation Cap -->
  <rect x="250" y="90" width="100" height="10" rx="2" fill="#2C2C2C" opacity="0.8"/>
  <polygon points="220,90 380,90 300,60" fill="#2C2C2C" opacity="0.7"/>
  <rect x="295" y="60" width="10" height="35" fill="#E8A87C" opacity="0.8"/>
  <circle cx="300" cy="95" r="8" fill="#C38E70" opacity="0.9"/>
  
  <!-- Body with Formal Attire -->
  <rect x="260" y="190" width="80" height="110" rx="15" fill="#2C2C2C" opacity="0.7"/>
