  <line x1="110" y1="270" x2="180" y2="270" stroke="#2C2C2C" stroke-width="2" opacity="0.3"/>
  <line x1="110" y1="285" x2="180" y2="285" stroke="#2C2C2C" stroke-width="2" opacity="0.3"/>
  <line x1="110" y1="300" x2="180" y2="300" stroke="#2C2C2C" stroke-width="2" opacity="0.3"/>
  
  <!-- Decorative Elements -->
