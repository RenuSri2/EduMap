      <stop offset="0%" style="stop-color:#C38E70;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7FA99B;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#FBF8F3"/>
  <rect width="600" height="400" fill="url(#grad3)"/>
  
  <!-- Graduate Figure with Cap -->
