<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7FA99B;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6B9AC4;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#FBF8F3"/>
  <rect width="600" height="400" fill="url(#grad2)"/>
  
  <!-- Laptop -->
  <rect x="200" y="220" width="200" height="120" rx="8" fill="#2C2C2C" opacity="0.8"/>
  <rect x="210" y="230" width="180" height="100" rx="4" fill="#6B9AC4" opacity="0.4"/>
  <rect x="180" y="340" width="240" height="10" rx="5" fill="#2C2C2C" opacity="0.6"/>
  
  <!-- Student Figure at Laptop -->
  <circle cx="300" cy="120" r="45" fill="#D97757" opacity="0.8"/>
  <rect x="265" y="165" width="70" height="80" rx="12" fill="#7FA99B" opacity="0.7"/>
  <rect x="250" y="180" width="35" height="70" rx="8" fill="#7FA99B" opacity="0.6"/>
  <rect x="315" y="180" width="35" height="70" rx="8" fill="#7FA99B" opacity="0.6"/>
  
  <!-- Coffee Cup -->
  <rect x="440" y="270" width="50" height="60" rx="6" fill="#C38E70" opacity="0.7"/>
  <ellipse cx="465" cy="270" rx="25" ry="8" fill="#C38E70" opacity="0.5"/>
  <rect x="485" y="280" width="15" height="30" rx="8" fill="#C38E70" opacity="0.6"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="35" fill="#E8A87C" opacity="0.3"/>
  <circle cx="500" cy="120" r="40" fill="#7FA99B" opacity="0.3"/>
  <circle cx="520" cy="180" r="25" fill="#D97757" opacity="0.3"/>
</svg>
