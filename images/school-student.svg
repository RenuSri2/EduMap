<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97757;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#E8A87C;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#FBF8F3"/>
  <rect width="600" height="400" fill="url(#grad1)"/>
  
  <!-- Books Stack -->
  <rect x="100" y="250" width="120" height="20" rx="4" fill="#7FA99B" opacity="0.7"/>
  <rect x="110" y="230" width="100" height="20" rx="4" fill="#D97757" opacity="0.7"/>
  <rect x="120" y="210" width="80" height="20" rx="4" fill="#C38E70" opacity="0.7"/>
  
  <!-- Student Figure -->
  <circle cx="300" cy="140" r="50" fill="#E8A87C" opacity="0.8"/>
  <rect x="260" y="190" width="80" height="100" rx="15" fill="#6B9AC4" opacity="0.7"/>
  <rect x="240" y="230" width="40" height="80" rx="8" fill="#6B9AC4" opacity="0.6"/>
  <rect x="320" y="230" width="40" height="80" rx="8" fill="#6B9AC4" opacity="0.6"/>
  
  <!-- Backpack -->
  <rect x="380" y="200" width="80" height="100" rx="12" fill="#D97757" opacity="0.6"/>
  <rect x="400" y="210" width="40" height="20" rx="4" fill="#C38E70" opacity="0.8"/>
  
  <!-- Decorative Elements -->
  <circle cx="480" cy="80" r="30" fill="#7FA99B" opacity="0.3"/>
  <circle cx="520" cy="120" r="20" fill="#E8A87C" opacity="0.3"/>
